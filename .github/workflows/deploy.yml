name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST || '41.186.186.162' }}
          SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '222' }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/production_key
          chmod 600 ~/.ssh/production_key
          ssh-keyscan -p "${SSH_PORT}" "${SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Ensure app directory exists
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST || '41.186.186.162' }}
          SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '222' }}
          SSH_USER: ${{ secrets.PRODUCTION_SSH_USER || 'root' }}
          APP_DIR: /var/www/connectify
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/production_key -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
            "mkdir -p '${APP_DIR}'"

      - name: Sync code to production
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST || '41.186.186.162' }}
          SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '222' }}
          SSH_USER: ${{ secrets.PRODUCTION_SSH_USER || 'root' }}
          APP_DIR: /var/www/connectify
        run: |
          set -euo pipefail
          rsync -az --delete \
            -e "ssh -i ~/.ssh/production_key -p ${SSH_PORT}" \
            --exclude='.env' \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            --exclude='storage/' \
            --exclude='public/storage' \
            --exclude='data.sql' \
            --exclude='database/*.sqlite*' \
            --exclude='bootstrap/cache/*.php' \
            ./ "${SSH_USER}@${SSH_HOST}:${APP_DIR}/"

      - name: Run production deploy
        env:
          SSH_HOST: ${{ secrets.PRODUCTION_SSH_HOST || '41.186.186.162' }}
          SSH_PORT: ${{ secrets.PRODUCTION_SSH_PORT || '222' }}
          SSH_USER: ${{ secrets.PRODUCTION_SSH_USER || 'root' }}
          APP_DIR: /var/www/connectify
          APP_URL: ${{ vars.PRODUCTION_APP_URL || 'https://connectify.rw' }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/production_key -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
            "APP_URL='${APP_URL}' bash '${APP_DIR}/scripts/deploy-ci.sh' '${APP_DIR}'"

      - name: Smoke test
        env:
          APP_URL: ${{ vars.PRODUCTION_APP_URL || 'https://connectify.rw' }}
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "${APP_URL}/up"
          curl --fail --silent --show-error --output /dev/null "${APP_URL}/"
